upstream nextjs {
    server app:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production (uncomment after TLS is set up)
    # return 301 https://$host$request_uri;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Next.js static assets (_next/static) ─────────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        # Immutable content-hashed assets — cache aggressively
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # ── Next.js image optimisation endpoint ──────────────────────────────────
    location /_next/image {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Public static files ───────────────────────────────────────────────────
    location /images/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
        proxy_set_header Host $host;
    }

    # ── All other requests → Next.js app ─────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts suitable for SSR pages with external API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

